# =============================================================================
# KavaNow — Local Production Image Build Overrides
# =============================================================================
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml --env-file .env.production build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        API_PORT: ${API_PORT:-3000}

  api-jobs:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-jobs

  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      target: caddy
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        SENTRY_DSN_WEB: ${SENTRY_DSN_WEB:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
