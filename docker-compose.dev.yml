# =============================================================================
# KavaNow — Development Services
# Only infrastructure services run in Docker. The API and web app run locally
# via `pnpm dev` for hot-reload.
#
# Start:   docker compose -f docker-compose.dev.yml up -d
# Then:    pnpm dev
# API:     http://localhost:3300
# Web:     http://localhost:3200
# Mailpit: http://localhost:8025
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kavanow
    volumes:
      # postgres:18+ images store data in a major-version subdirectory under
      # /var/lib/postgresql — mounting at .../data breaks startup.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:1025:1025" # SMTP
      - "127.0.0.1:8025:8025" # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
