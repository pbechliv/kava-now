<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      // iOS has no native dark-mode icon support for web apps, but it reads
      // the live DOM when the user taps "Add to Home Screen" — swap the icon
      // up front so dark-mode users install the dark variant.
      if (matchMedia("(prefers-color-scheme: dark)").matches)
        document.querySelector('link[rel="apple-touch-icon"]').href = "/apple-touch-icon-dark.png";
    </script>
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#d97706" />
    <title>KavaNow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
