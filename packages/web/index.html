<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="color-scheme" content="light dark" />
    <!-- Applies the OS color scheme to <html> before first paint; external
         script for the same CSP reason as icon-scheme.js below. -->
    <script src="/theme-init.js"></script>
    <!-- Swaps the touch icon for dark mode; must be an external script — the
         production CSP has no 'unsafe-inline' for script-src. -->
    <script src="/icon-scheme.js"></script>
    <!-- Reloads once when the entry bundle 404s (stale shell racing a
         deploy) — otherwise the page stays a blank white screen. -->
    <script src="/boot-guard.js"></script>
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#d97706" />
    <title>KavaNow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
