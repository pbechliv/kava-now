packages:
  - "packages/*"
allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.21
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.21
  vite-plus: ^0.1.23
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  zod: ^4.4.3
  # better-auth's kysely-adapter claims kysely ^0.29 support but imports
  # DEFAULT_MIGRATION_{LOCK_,}TABLE, which 0.29 removed — bundling the API
  # fails with MISSING_EXPORT. Pin to 0.28.x until upstream fixes the adapter.
  kysely: ^0.28.17
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
