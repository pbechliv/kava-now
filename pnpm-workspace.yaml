packages:
  - "packages/*"
# Build-script approval (pnpm 11 'allowBuilds'): only these packages may run
# install scripts. @sentry/cli fetches its platform binary; esbuild compiles.
allowBuilds:
  "@sentry/cli": true
  esbuild: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.4
  vitest: ^4.1.10
  vite-plus: ^0.2.4
minimumReleaseAgeExclude:
  - "@base-ui/react@1.6.0"
  - "@base-ui/utils@0.3.1"
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  zod: ^4.4.3
  # better-auth's kysely-adapter claims kysely ^0.29 support but imports
  # DEFAULT_MIGRATION_{LOCK_,}TABLE, which 0.29 removed — bundling the API
  # fails with MISSING_EXPORT. Pin to 0.28.x until upstream fixes the adapter.
  kysely: ^0.28.17
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
