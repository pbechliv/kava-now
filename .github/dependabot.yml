version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    versioning-strategy: increase
    # Wait out pnpm's minimumReleaseAge (1d default) before opening bump PRs,
    # otherwise `pnpm install --frozen-lockfile` rejects too-fresh versions in
    # CI. Margin above 1d so weekend releases don't fail Monday's run.
    cooldown:
      default-days: 7
      semver-patch-days: 3
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # One grouped PR for all npm updates. On 2026-06-24 several concurrent
      # lockfile-touching PRs auto-merged without rebasing onto each other, so
      # Git text-merged their overlapping pnpm-lock.yaml regions into duplicate
      # keys and broke every deploy. One PR = one lockfile change = no
      # concurrent-merge interaction. Branch protection (strict status checks)
      # is the backstop if a single grouped PR is ever itself malformed.
      npm-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    # The Node version is pinned in both the Dockerfile and .node-version, but
    # dependabot's docker ecosystem only sees the Dockerfile — bumping it alone
    # drifts the two. .node-version has no dependabot ecosystem, so Node bumps
    # are done by hand across both files. Caddy updates still flow through here.
    ignore:
      - dependency-name: "node"

  - package-ecosystem: docker-compose
    directories:
      - /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
