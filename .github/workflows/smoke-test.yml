name: Smoke test

on:
  workflow_call:
    inputs:
      host:
        type: string
        default: kavanow.gr
        description: Host to probe (SNI + Host header).
      expected_version:
        type: string
        required: false
        description: >-
          Git SHA the deployed API must report from /api/health. Catches
          deploys where the containers silently kept running old code.
    secrets:
      origin_ip:
        required: false
        description: >-
          When set, probe the origin directly via curl --resolve, bypassing
          Cloudflare. Required because Cloudflare Bot Fight Mode (free plan)
          blocks datacenter IPs — GitHub runners included — and cannot be
          allowlisted. Passed as a secret so the origin IP stays masked in logs.

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HOST: ${{ inputs.host }}
      ORIGIN_IP: ${{ secrets.origin_ip }}
    steps:
      # --resolve pins HOST:443 to the origin IP; -k because the origin serves
      # the Cloudflare Origin CA cert, which is trusted by CF, not by the OS.
      # SNI + Host stay HOST, so Caddy serves the right vhost and the app sees
      # the real hostname. Edge behaviour (cache, proxy) is covered by the §5
      # manual checklist, not gated here.
      - name: Resolve flags
        run: |
          if [ -n "$ORIGIN_IP" ]; then
            echo "CURL_RESOLVE=--resolve $HOST:443:$ORIGIN_IP -k" >> "$GITHUB_ENV"
            echo "Probing origin directly (bypassing Cloudflare)."
          else
            echo "CURL_RESOLVE=" >> "$GITHUB_ENV"
            echo "Probing through Cloudflare (no origin_ip provided)."
          fi

      - name: API health
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          body=$(curl -fS --retry 10 --retry-delay 3 $CURL_RESOLVE "https://$HOST/api/health")
          echo "$body"
          if [ -n "$EXPECTED_VERSION" ]; then
            echo "$body" | grep -q "\"version\":\"$EXPECTED_VERSION\"" || {
              echo "::error::Deployed version mismatch — /api/health does not report $EXPECTED_VERSION"
              exit 1
            }
          fi

      - name: SPA root
        run: curl -fS -o /dev/null $CURL_RESOLVE "https://$HOST/"

      - name: TLS expiry
        run: |
          set -euo pipefail
          if [ -n "$ORIGIN_IP" ]; then connect="$ORIGIN_IP:443"; else connect="$HOST:443"; fi
          end=$(openssl s_client -servername "$HOST" -connect "$connect" </dev/null 2>/dev/null \
                | openssl x509 -noout -enddate | cut -d= -f2)
          echo "Certificate notAfter: $end"
          end_epoch=$(date -u -d "$end" +%s)
          days_left=$(( (end_epoch - $(date -u +%s)) / 86400 ))
          echo "Days left: $days_left"
          if [ "$days_left" -lt 7 ]; then
            echo "::error::Certificate expires in less than 7 days." >&2
            exit 1
          fi
