name: Migrate database

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: read # ephemeral GHCR login below

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.HETZNER_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # In case `docker compose run` needs to pull the api-jobs image.
      - name: GHCR login on VM
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh -i ~/.ssh/id_ed25519 deploy@"$HETZNER_HOST" \
            'docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin'

      - name: Run migrations
        run: |
          {
            echo "## Migration output"
            echo '```'
            ssh -i ~/.ssh/id_ed25519 deploy@"$HETZNER_HOST" <<'EOF'
          set -euo pipefail
          cd /srv/kavanow
          # Restore point first — a failed dump blocks the migration.
          # (backup.sh is shipped to the VM by deploy.yml; see infra/backup/README.md)
          /srv/kavanow/backup.sh pre-migrate-manual
          # </dev/null: compose run attaches stdin and would eat the heredoc tail
          docker compose --env-file .env.production --profile jobs run --rm api-jobs \
            pnpm --filter @kava-now/api db:migrate </dev/null
          EOF
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
