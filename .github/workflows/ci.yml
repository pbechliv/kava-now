name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kavanow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm build

      # Provision the test DB as the privileged role: migrations + RLS policies
      # + the NOSUPERUSER kavanow_app role used by the RLS isolation tests.
      - name: Provision test database
        run: pnpm --filter @kava-now/api db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kavanow
          APP_DB_PASSWORD: ci_app_pw

      # Tests, incl. the RLS tenant-isolation suite (connects as kavanow_app —
      # RLS is bypassed for superusers, so the role matters).
      - name: Test
        run: pnpm test
        env:
          RLS_TEST_DATABASE_URL: postgresql://kavanow_app:ci_app_pw@localhost:5432/kavanow
