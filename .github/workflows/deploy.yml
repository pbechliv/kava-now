name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        type: string
        description: Optional SHA to deploy. Defaults to the workflow ref.

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Per-job permissions (#70): the deploy job pipes its GITHUB_TOKEN to the VM
# for `docker login` — that token must only be able to PULL. Only the build
# job may write packages.
permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.pick.outputs.sha }}
    steps:
      - id: pick
        env:
          # Via env, not inline interpolation — dispatch inputs are
          # writer-controlled, but script injection hygiene is free (#70).
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          if [ -n "$SHA_INPUT" ]; then
            echo "sha=$SHA_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: resolve
    uses: ./.github/workflows/ci.yml
    with:
      sha: ${{ needs.resolve.outputs.sha }}

  build:
    needs: [resolve, ci]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      sha: ${{ needs.resolve.outputs.sha }}
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}

  deploy:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    # A hung SSH must not hold the deploy-prod concurrency group for the
    # 6-hour default — that blocks every deploy/migration behind it (#70).
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    environment: production
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.sha }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.HETZNER_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Ephemeral job token (packages:read) — no long-lived GHCR PAT on the VM.
      # The stored credential goes stale after the job; the next deploy renews it.
      - name: GHCR login on VM
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh -i ~/.ssh/id_ed25519 deploy@"$HETZNER_HOST" \
            'docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin'

      - name: Copy compose + Caddyfile + postgres config + backup script to VM
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@"$HETZNER_HOST" 'mkdir -p /srv/kavanow/infra/postgres'
          scp -i ~/.ssh/id_ed25519 \
              docker-compose.yml Caddyfile infra/backup/backup.sh \
              deploy@"$HETZNER_HOST":/srv/kavanow/
          # compose bind-mounts this into postgres; a missing file would be
          # auto-created as a directory and postgres FATALs on boot
          scp -i ~/.ssh/id_ed25519 \
              infra/postgres/postgresql.conf \
              deploy@"$HETZNER_HOST":/srv/kavanow/infra/postgres/

      - name: Pull, migrate, restart
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@"$HETZNER_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOF'
          set -euo pipefail
          cd /srv/kavanow
          export IMAGE_TAG
          chmod +x /srv/kavanow/backup.sh
          docker compose --env-file .env.production --profile jobs pull
          docker compose --env-file .env.production up -d postgres
          # Restore point before migrating — a failed dump blocks the deploy.
          # Restore procedure: infra/backup/README.md
          /srv/kavanow/backup.sh "pre-migrate-${IMAGE_TAG:0:7}"
          # Nightly logical backup (idempotent crontab install).
          ( crontab -l 2>/dev/null | grep -v 'kavanow/backup\.sh' || true; \
            echo '17 2 * * * /srv/kavanow/backup.sh nightly >> /srv/kavanow/backups/backup.log 2>&1' ) | crontab -
          # </dev/null is load-bearing: compose run attaches stdin by default and
          # would swallow the rest of this heredoc — bash -s would then stop here
          # (exit 0) and the commands below would silently never run.
          docker compose --env-file .env.production --profile jobs run --rm api-jobs </dev/null
          # Seed after migrating (override the image's migrate-only CMD). The
          # seed is idempotent: existing superadmin / demo tenant are skipped.
          docker compose --env-file .env.production --profile jobs run --rm api-jobs \
            ./node_modules/.bin/tsx src/db/seed.ts </dev/null
          docker compose --env-file .env.production up -d api caddy
          # Persist the deployed tag so migrate.yml and manual compose
          # commands on the VM act on the RUNNING version, not :latest (#70).
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env.production
          docker image prune -f
          EOF

  smoke:
    needs: [resolve, deploy]
    uses: ./.github/workflows/smoke-test.yml
    with:
      expected_version: ${{ needs.resolve.outputs.sha }}
    secrets:
      # Probe the origin directly — CF Bot Fight Mode 403s the runner's
      # datacenter IP and can't be allowlisted on the free plan.
      origin_ip: ${{ secrets.HETZNER_HOST }}
