name: Build images

on:
  workflow_call:
    inputs:
      sha:
        type: string
        required: true
        description: Git SHA to tag the images with.
    secrets:
      SENTRY_AUTH_TOKEN:
        required: false
      GOOGLE_CLIENT_ID:
        required: false
      SENTRY_DSN_WEB:
        required: false

# No concurrency block here: this workflow is only ever workflow_call'd by
# deploy.yml, which already holds the deploy-prod group — a called workflow
# re-taking the caller's group self-deadlocks and GitHub kills the call.

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            target: api
            image: ghcr.io/pbechliv/kava-now-api
          - name: api-jobs
            target: api-jobs
            image: ghcr.io/pbechliv/kava-now-api-jobs
          - name: caddy
            target: caddy
            image: ghcr.io/pbechliv/kava-now-caddy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ inputs.sha }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            API_PORT=3000
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            SENTRY_DSN_WEB=${{ secrets.SENTRY_DSN_WEB }}
            SENTRY_ENVIRONMENT=production
            SENTRY_RELEASE=${{ inputs.sha }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
