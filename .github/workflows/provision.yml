name: Provision infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        required: true
        description: Action to run.
        options:
          - plan
          - apply # terraform apply, then bootstrap the VM
          - bootstrap # skip Terraform changes, (re)run the VM bootstrap only

# Serialize with deploy/migrate — bootstrap rewrites .env.production and must
# not interleave with a running deploy.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: infrastructure
    defaults:
      run:
        working-directory: infra/terraform
    outputs:
      vm_ipv4: ${{ steps.tf_out.outputs.vm_ipv4 }}
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_STATE_TOKEN }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_pub_key: ${{ secrets.HETZNER_SSH_PUB_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_wrapper: false

      - run: terraform init

      - if: ${{ inputs.action != 'bootstrap' }}
        run: terraform plan -out=tfplan
      - if: ${{ inputs.action != 'bootstrap' }}
        run: terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"

      - if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      - id: tf_out
        name: Export VM IP
        run: |
          vm_ipv4=$(terraform output -raw vm_ipv4 2>/dev/null || true)
          echo "vm_ipv4=$vm_ipv4" >> "$GITHUB_OUTPUT"
          if [ -n "$vm_ipv4" ]; then
            {
              echo "## Terraform outputs"
              echo '```'
              terraform output
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Post-provision VM bootstrap — replaces the old interactive scripts/bootstrap-vm.sh.
  # Wires the operational secrets that deliberately stay out of Terraform state:
  # Cloudflare Origin CA cert, /srv/kavanow/.env.production.
  # Idempotent: safe to re-run via action=bootstrap (e.g. after rotating a secret).
  bootstrap:
    if: ${{ inputs.action == 'apply' || inputs.action == 'bootstrap' }}
    needs: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: infrastructure
    env:
      VM_IP: ${{ needs.terraform.outputs.vm_ipv4 }}
    steps:
      - name: Guard — VM IP available
        run: |
          if [ -z "$VM_IP" ]; then
            echo "::error::Terraform has no vm_ipv4 output — run action=apply first."
            exit 1
          fi

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host vm
            HostName $VM_IP
            User deploy
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF

      - name: Wait for SSH + cloud-init
        run: |
          # Sanity-check the key material first — a mangled HETZNER_SSH_KEY
          # otherwise looks identical to "VM not up yet" for 5 minutes.
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null || {
            echo "::error::HETZNER_SSH_KEY secret is not a valid private key (multi-line PEM required — set it with: pbpaste | gh secret set HETZNER_SSH_KEY)"
            exit 1
          }
          # Print the fingerprint so a wrong-key mixup is diagnosable from the log
          # (compare against the kavanow-deploy item in 1Password / ssh-add -l).
          echo "Using key: $(ssh-keygen -lf ~/.ssh/id_ed25519)"
          # Wait for the TCP port (VM boot), separately from auth.
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/"$VM_IP"/22) 2>/dev/null; then exec 3>&-; break; fi
            echo "port 22 not open yet ($i/30), retrying in 10s…"
            sleep 10
          done
          ssh vm 'sudo cloud-init status --wait >/dev/null && echo "cloud-init: done"'

      # No GHCR login here — deploy.yml logs the VM in per-deploy with its
      # ephemeral GITHUB_TOKEN (packages:read), so no long-lived PAT exists.

      - name: Install Cloudflare Origin CA cert
        env:
          ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
        run: |
          printf '%s\n' "$ORIGIN_CERT" | ssh vm 'sudo tee /etc/kavanow/tls/origin.pem >/dev/null'
          printf '%s\n' "$ORIGIN_KEY" | ssh vm 'sudo tee /etc/kavanow/tls/origin.key >/dev/null'
          ssh vm '
            sudo chown root:root /etc/kavanow/tls/origin.pem /etc/kavanow/tls/origin.key
            sudo chmod 644 /etc/kavanow/tls/origin.pem
            sudo chmod 600 /etc/kavanow/tls/origin.key
            cert_pub=$(sudo openssl x509 -noout -pubkey -in /etc/kavanow/tls/origin.pem | openssl md5)
            key_pub=$(sudo openssl pkey -in /etc/kavanow/tls/origin.key -pubout | openssl md5)
            if [ "$cert_pub" != "$key_pub" ]; then
              echo "ERROR: origin.pem and origin.key do not match" >&2
              exit 1
            fi
            echo "TLS: cert and key match"
          '

      - name: Write .env.production
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          umask 077
          cat > envfile <<EOF
          # Generated by provision.yml (bootstrap job) — do not edit by hand;
          # rotate values in GitHub Secrets and re-run action=bootstrap instead.
          POSTGRES_USER=kavanow
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=kavanow
          DATABASE_URL=postgres://kavanow:$POSTGRES_PASSWORD@postgres:5432/kavanow
          APP_DB_PASSWORD=$APP_DB_PASSWORD

          NODE_ENV=production
          API_PORT=3000
          APP_ORIGIN=https://kavanow.gr

          BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET

          RESEND_API_KEY=$RESEND_API_KEY
          RESEND_FROM="KavaNow <noreply@kavanow.gr>"

          SUPERADMIN_EMAIL=$SUPERADMIN_EMAIL
          SUPERADMIN_PASSWORD=$SUPERADMIN_PASSWORD

          SENTRY_DSN_API=$SENTRY_DSN_API
          SENTRY_DSN_WEB=$SENTRY_DSN_WEB
          SENTRY_ENVIRONMENT=production
          SENTRY_RELEASE=

          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET

          VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY
          VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY
          VAPID_SUBJECT=mailto:ops@kavanow.gr

          IMAGE_TAG=latest
          EOF
          scp envfile vm:/srv/kavanow/.env.production
          ssh vm 'chmod 600 /srv/kavanow/.env.production'
          rm -f envfile

      - name: Summary
        run: |
          {
            echo "## Bootstrap complete — $VM_IP"
            echo
            echo '- Origin CA cert (validated) + `.env.production` written. GHCR login happens per-deploy.'
            echo '- If this is a new/rebuilt VM, refresh the deploy secrets:'
            echo '  ```'
            echo "  gh secret set HETZNER_HOST --body '$VM_IP'"
            echo "  ssh-keyscan $VM_IP | gh secret set HETZNER_SSH_KNOWN_HOSTS"
            echo '  ```'
            echo '- Next: run deploy.yml.'
          } >> "$GITHUB_STEP_SUMMARY"
