# =============================================================================
# KavaNow — Production Docker Compose
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kavanow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kavanow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kavanow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-kavanow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kavanow}
      PORT: 3000
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - internal

  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      target: caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
