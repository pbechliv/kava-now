# =============================================================================
# KavaNow — Production Docker Compose
# =============================================================================

# Bounded container logs (#65): Caddy logs every request as JSON and the API
# logs every request line — the default json-file driver grows unbounded and
# would eventually fill the VM disk, taking Postgres down with it.
x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    logging: *bounded-logging
    # Keep postgresql.conf's memory budget honest (#65): shared_buffers=1GB +
    # work_mem headroom; the kernel OOM killer must never pick postgres
    # because another container leaked.
    mem_limit: 2g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kavanow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-kavanow}
    volumes:
      # postgres:18+ images store data in a major-version subdirectory under
      # /var/lib/postgresql — mounting at .../data breaks startup.
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kavanow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    image: ghcr.io/pbechliv/kava-now-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *bounded-logging
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Heap ceiling below the container limit so Node aborts with a clear
      # OOM instead of getting SIGKILLed by the cgroup.
      NODE_OPTIONS: --max-old-space-size=512
      # The running server connects as the NOSUPERUSER app role so Row-Level
      # Security is enforced — a Postgres superuser bypasses RLS. The role is
      # provisioned by db:migrate (api-jobs) using APP_DB_PASSWORD.
      APP_DATABASE_URL: postgres://${APP_DB_ROLE:-kavanow_app}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env.production}@postgres:5432/${POSTGRES_DB:-kavanow}
      API_PORT: 3000
      # Deployed git SHA — surfaced by /api/health so the smoke test can prove
      # the new code is actually serving (a silently-skipped restart otherwise
      # passes every probe).
      APP_VERSION: ${IMAGE_TAG:-latest}
    env_file:
      - ${KAVANOW_ENV_FILE:-.env.production}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  api-jobs:
    image: ghcr.io/pbechliv/kava-now-api-jobs:${IMAGE_TAG:-latest}
    logging: *bounded-logging
    mem_limit: 768m
    profiles:
      - jobs
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Privileged connection for migrations/seeds. db:migrate also provisions
      # the NOSUPERUSER kavanow_app role (used by the api service) with APP_DB_PASSWORD.
      DATABASE_URL: postgres://${POSTGRES_USER:-kavanow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kavanow}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env.production}
    env_file:
      - ${KAVANOW_ENV_FILE:-.env.production}
    networks:
      - internal

  caddy:
    image: ghcr.io/pbechliv/kava-now-caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *bounded-logging
    mem_limit: 256m
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - /etc/kavanow/tls/origin.pem:/etc/caddy/origin.pem:ro
      - /etc/kavanow/tls/origin.key:/etc/caddy/origin.key:ro
    networks:
      - internal

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
